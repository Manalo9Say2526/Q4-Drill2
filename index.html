<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Heat Index Checker</h1>
        <br>
        <h5>Note:</h5>
            <p>Input the temperature (℃) and humidity (%), then click Check to see the heat index and its status.</p>
        
        <label>Degree in ℃: </label>
        <input type="number" class="form-control" id="degree" placeholder="Input degree value">
        <br>
        <label>humidity in %: </label>
        <input type="number" class="form-control" id="percent" placeholder="Input percentage value">
        <br>
        <button type="button" class="btn btn-primary" onclick="checkIndex()">Check</button>
        <button type="button" class="btn btn-success" onclick="window.location.reload()">Refresh</button>
    </div>

    <script src="main.js"></script>

</body>
</html>
